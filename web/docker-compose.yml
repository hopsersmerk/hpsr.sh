services:
  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    restart: unless-stopped
    networks:
      - dokploy-network
    labels:
      - traefik.enable=true
      - traefik.docker.network=dokploy-network
      - traefik.http.routers.hpsr-web.rule=Host(`hpsr.sh`)
      - traefik.http.routers.hpsr-web.entrypoints=websecure
      - traefik.http.routers.hpsr-web.tls=true
      - traefik.http.services.hpsr-web.loadbalancer.server.port=80

networks:
  dokploy-network:
    external: true
